<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="620" viewBox="0 0 1320 620">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
<path d="M0,0 L10,4 L0,8 Z" fill="#2f3a4a"/>
</marker>
</defs>
<rect width="100%" height="100%" fill="#fbfcfe"/>
<text x="660" y="36" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="24" font-weight="700" fill="#152333">3D U-Net 神经网络架构</text>
<rect x="70" y="90" width="180" height="70" rx="8" fill="#eaf5ee" stroke="#58708d" stroke-width="1.4"/>
<text x="160.0" y="114" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="700" fill="#1d2b3a">Encoder 0</text>
<text x="160.0" y="138" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" fill="#405064">1-&gt;4</text>
<text x="160.0" y="156" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" fill="#405064">Conv3D x2 + Norm + ReLU</text>
<line x1="160" y1="160" x2="250" y2="185" stroke="#2f3a4a" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="202" y="182" font-family="Arial" font-size="12" fill="#596a7d">MaxPool3D 2x2x2</text>
<rect x="160" y="185" width="180" height="70" rx="8" fill="#eaf5ee" stroke="#58708d" stroke-width="1.4"/>
<text x="250.0" y="209" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="700" fill="#1d2b3a">Encoder 1</text>
<text x="250.0" y="233" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" fill="#405064">4-&gt;8</text>
<text x="250.0" y="251" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" fill="#405064">Conv3D x2 + Norm + ReLU</text>
<rect x="540" y="455" width="210" height="80" rx="8" fill="#fff3e0" stroke="#58708d" stroke-width="1.4"/>
<text x="645.0" y="479" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="700" fill="#1d2b3a">Bottleneck</text>
<text x="645.0" y="503" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" fill="#405064">8-&gt;16</text>
<text x="645.0" y="521" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" fill="#405064">deep semantic features</text>
<line x1="250" y1="255" x2="540" y2="495" stroke="#2f3a4a" stroke-width="1.8" marker-end="url(#arrow)"/>
<rect x="900" y="185" width="190" height="76" rx="8" fill="#edf0ff" stroke="#58708d" stroke-width="1.4"/>
<text x="995.0" y="209" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="700" fill="#1d2b3a">Decoder 1</text>
<text x="995.0" y="233" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" fill="#405064">UpConv 16-&gt;8</text>
<text x="995.0" y="251" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" fill="#405064">Concat skip + Conv3D x2</text>
<line x1="340" y1="223" x2="900" y2="223" stroke="#2f3a4a" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="620.0" y="213" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" fill="#596a7d">skip connection</text>
<rect x="810" y="90" width="190" height="76" rx="8" fill="#edf0ff" stroke="#58708d" stroke-width="1.4"/>
<text x="905.0" y="114" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="700" fill="#1d2b3a">Decoder 0</text>
<text x="905.0" y="138" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" fill="#405064">UpConv 8-&gt;4</text>
<text x="905.0" y="156" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" fill="#405064">Concat skip + Conv3D x2</text>
<line x1="250" y1="128" x2="810" y2="128" stroke="#2f3a4a" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="530.0" y="118" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" fill="#596a7d">skip connection</text>
<line x1="750" y1="495" x2="905" y2="261" stroke="#2f3a4a" stroke-width="1.8" marker-end="url(#arrow)"/>
<line x1="1090" y1="128" x2="1145" y2="128" stroke="#2f3a4a" stroke-width="1.8" marker-end="url(#arrow)"/>
<rect x="1145" y="90" width="130" height="76" rx="8" fill="#ffeef0" stroke="#58708d" stroke-width="1.4"/>
<text x="1210.0" y="114" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="700" fill="#1d2b3a">Head</text>
<text x="1210.0" y="138" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" fill="#405064">Conv1x1x1</text>
<text x="1210.0" y="156" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" fill="#405064">1-channel logits</text>
<text x="660" y="585" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="13" fill="#52616f">输入/输出张量: (B, C, D, H, W)。模型自动 padding 并裁回原始空间尺寸。</text>
</svg>