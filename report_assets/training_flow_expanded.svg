<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="680" viewBox="0 0 1400 680">
  <defs><marker id="a" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#34495e"/></marker><style>.title{font:700 30px Arial,'Microsoft YaHei',sans-serif;fill:#17324d}.h{font:700 17px Arial,'Microsoft YaHei',sans-serif;fill:#17324d}.t{font:14px Arial,'Microsoft YaHei',sans-serif;fill:#40566b}.s{font:13px Arial,'Microsoft YaHei',sans-serif;fill:#5d6d7e}.b{stroke:#607d94;stroke-width:1.8}.l{stroke:#34495e;stroke-width:2;fill:none;marker-end:url(#a)}</style></defs>
  <rect width="1400" height="680" fill="#fbfcfe"/>
  <text x="700" y="48" text-anchor="middle" class="title">金属伪影 3D U-Net 模型训练流程</text>
  <rect x="45" y="105" width="190" height="125" rx="9" fill="#eaf3fb" class="b"/><text x="140" y="140" text-anchor="middle" class="h">CT 与 Mask 配对</text><text x="140" y="173" text-anchor="middle" class="t">NIfTI 同名数据</text><text x="140" y="199" text-anchor="middle" class="s">检查尺寸与空间信息</text>
  <rect x="280" y="105" width="190" height="125" rx="9" fill="#eaf3fb" class="b"/><text x="375" y="140" text-anchor="middle" class="h">病例级数据划分</text><text x="375" y="173" text-anchor="middle" class="t">固定 seed=2026</text><text x="375" y="199" text-anchor="middle" class="s">train / validation</text>
  <rect x="515" y="105" width="190" height="125" rx="9" fill="#eef8f1" class="b"/><text x="610" y="140" text-anchor="middle" class="h">3D Patch 采样</text><text x="610" y="173" text-anchor="middle" class="t">32 × 128 × 128</text><text x="610" y="199" text-anchor="middle" class="s">按 mask 提高阳性采样</text>
  <rect x="750" y="105" width="190" height="125" rx="9" fill="#eef8f1" class="b"/><text x="845" y="140" text-anchor="middle" class="h">数据增强</text><text x="845" y="173" text-anchor="middle" class="t">翻转、旋转、强度扰动</text><text x="845" y="199" text-anchor="middle" class="s">噪声与归一化</text>
  <rect x="985" y="105" width="190" height="125" rx="9" fill="#fff4e6" class="b"/><text x="1080" y="140" text-anchor="middle" class="h">3D U-Net 前向</text><text x="1080" y="173" text-anchor="middle" class="t">Encoder / Decoder</text><text x="1080" y="199" text-anchor="middle" class="s">输出单通道 logits</text>
  <path d="M235 168 L280 168" class="l"/><path d="M470 168 L515 168" class="l"/><path d="M705 168 L750 168" class="l"/><path d="M940 168 L985 168" class="l"/>
  <rect x="990" y="365" width="250" height="135" rx="9" fill="#fdeeee" class="b"/><text x="1115" y="403" text-anchor="middle" class="h">联合损失与反向传播</text><text x="1115" y="436" text-anchor="middle" class="t">0.7 Dice + 0.3 BCE</text><text x="1115" y="463" text-anchor="middle" class="s">pos_weight ≤ 30</text>
  <rect x="670" y="365" width="250" height="135" rx="9" fill="#f4eff9" class="b"/><text x="795" y="403" text-anchor="middle" class="h">验证与指标计算</text><text x="795" y="436" text-anchor="middle" class="t">Dice / IoU</text><text x="795" y="463" text-anchor="middle" class="s">Recall / Precision</text>
  <rect x="350" y="365" width="250" height="135" rx="9" fill="#eef4ff" class="b"/><text x="475" y="403" text-anchor="middle" class="h">模型选择与调度</text><text x="475" y="436" text-anchor="middle" class="t">Best validation Dice</text><text x="475" y="463" text-anchor="middle" class="s">CosineAnnealingLR</text>
  <rect x="30" y="365" width="250" height="135" rx="9" fill="#eef4ff" class="b"/><text x="155" y="403" text-anchor="middle" class="h">训练输出产物</text><text x="155" y="436" text-anchor="middle" class="t">best / last checkpoint</text><text x="155" y="463" text-anchor="middle" class="s">metrics 与可视化图表</text>
  <path d="M1080 230 L1115 365" class="l"/><path d="M990 433 L920 433" class="l"/><path d="M670 433 L600 433" class="l"/><path d="M350 433 L280 433" class="l"/>
  <path d="M795 365 C800 295 1010 285 1080 230" class="l"/>
  <text x="700" y="590" text-anchor="middle" class="h">训练闭环</text>
  <text x="700" y="620" text-anchor="middle" class="t">每轮重新生成可复现 patch 计划，完成训练、验证、指标记录和权重更新；训练完成后进入滑窗推理与服务接入验证。</text>
</svg>
